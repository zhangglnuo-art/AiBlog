<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" fill="none">
  <defs>
    <linearGradient id="dfBg" x1="0" y1="0" x2="0.7" y2="1">
      <stop offset="0" stop-color="#0d0817"/>
      <stop offset="1" stop-color="#120a1e"/>
    </linearGradient>
    <linearGradient id="dfCap" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#c4b5fd"/>
      <stop offset="1" stop-color="#f9a8d4"/>
    </linearGradient>
    <linearGradient id="dfSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f9a8d4"/>
      <stop offset="1" stop-color="#c4b5fd"/>
    </linearGradient>
    <clipPath id="dfClip"><rect x="0" y="0" width="224" height="224" rx="14"/></clipPath>
  </defs>

  <rect width="1200" height="675" fill="url(#dfBg)"/>
  <text x="80" y="88" font-family="Inter, 'Segoe UI', sans-serif" font-size="24" letter-spacing="6" font-weight="600" fill="#c4b5fd">// AI 原理</text>

  <!-- 帧 1：纯噪声 -->
  <g transform="translate(80 150)">
    <rect x="0" y="0" width="224" height="224" rx="14" fill="#1a1226" stroke="#c4b5fd" stroke-opacity="0.35"/>
    <g clip-path="url(#dfClip)" fill="#8b7bb5">
      <rect x="12" y="10" width="16" height="16"/><rect x="44" y="30" width="16" height="16" fill="#5c4f7d"/><rect x="80" y="8" width="16" height="16" fill="#b0a0d0"/><rect x="120" y="24" width="16" height="16" fill="#6b5c8f"/><rect x="160" y="12" width="16" height="16" fill="#9d8dc0"/><rect x="196" y="34" width="16" height="16" fill="#5c4f7d"/>
      <rect x="20" y="52" width="16" height="16" fill="#a89ac8"/><rect x="60" y="66" width="16" height="16" fill="#6b5c8f"/><rect x="100" y="54" width="16" height="16" fill="#b0a0d0"/><rect x="140" y="70" width="16" height="16" fill="#5c4f7d"/><rect x="180" y="58" width="16" height="16" fill="#9d8dc0"/>
      <rect x="8" y="96" width="16" height="16" fill="#6b5c8f"/><rect x="48" y="104" width="16" height="16" fill="#b0a0d0"/><rect x="88" y="92" width="16" height="16" fill="#5c4f7d"/><rect x="128" y="108" width="16" height="16" fill="#a89ac8"/><rect x="168" y="98" width="16" height="16" fill="#6b5c8f"/><rect x="200" y="112" width="16" height="16" fill="#9d8dc0"/>
      <rect x="24" y="140" width="16" height="16" fill="#b0a0d0"/><rect x="64" y="150" width="16" height="16" fill="#5c4f7d"/><rect x="104" y="138" width="16" height="16" fill="#9d8dc0"/><rect x="144" y="154" width="16" height="16" fill="#6b5c8f"/><rect x="184" y="144" width="16" height="16" fill="#a89ac8"/>
      <rect x="12" y="184" width="16" height="16" fill="#5c4f7d"/><rect x="52" y="196" width="16" height="16" fill="#9d8dc0"/><rect x="92" y="186" width="16" height="16" fill="#6b5c8f"/><rect x="132" y="200" width="16" height="16" fill="#b0a0d0"/><rect x="172" y="188" width="16" height="16" fill="#5c4f7d"/><rect x="200" y="198" width="16" height="16" fill="#9d8dc0"/>
    </g>
    <text x="112" y="256" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="19" font-weight="700" fill="#8b7bb5" text-anchor="middle">纯噪声</text>
  </g>

  <!-- 帧 2：隐约成形 -->
  <g transform="translate(346 150)">
    <rect x="0" y="0" width="224" height="224" rx="14" fill="#1a1226" stroke="#c4b5fd" stroke-opacity="0.35"/>
    <g clip-path="url(#dfClip)">
      <rect x="0" y="0" width="224" height="150" fill="#5f5588" opacity="0.7"/>
      <rect x="0" y="150" width="224" height="74" fill="#4a4270" opacity="0.7"/>
      <circle cx="160" cy="60" r="26" fill="#c9a2d8" opacity="0.5"/>
      <g fill="#7d6ca5" opacity="0.75">
        <rect x="20" y="40" width="14" height="14"/><rect x="70" y="20" width="14" height="14"/><rect x="120" y="90" width="14" height="14"/><rect x="40" y="120" width="14" height="14"/><rect x="180" y="130" width="14" height="14"/><rect x="90" y="170" width="14" height="14"/><rect x="150" y="180" width="14" height="14"/>
      </g>
    </g>
    <text x="112" y="256" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="19" font-weight="700" fill="#a99bc9" text-anchor="middle">隐约成形</text>
  </g>

  <!-- 帧 3：清晰显影（山 + 日） -->
  <g transform="translate(612 150)">
    <rect x="0" y="0" width="224" height="224" rx="14" fill="#1a1226" stroke="#c4b5fd" stroke-opacity="0.35"/>
    <g clip-path="url(#dfClip)">
      <rect x="0" y="0" width="224" height="224" fill="url(#dfSky)"/>
      <circle cx="164" cy="58" r="30" fill="#fde68a"/>
      <path d="M0 224 L70 120 L120 180 L170 110 L224 224 Z" fill="#7c5cbf"/>
      <path d="M60 224 L130 140 L200 224 Z" fill="#9d7fd8"/>
    </g>
    <text x="112" y="256" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="19" font-weight="700" fill="#f0abfc" text-anchor="middle">清晰图像</text>
  </g>

  <!-- 箭头：去噪方向 -->
  <g stroke="#f9a8d4" stroke-opacity="0.8" stroke-width="4" fill="none">
    <path d="M312 262 H 340"/><path d="M330 253 L 346 262 L 330 271 Z" fill="#f9a8d4" stroke="none"/>
    <path d="M578 262 H 606"/><path d="M596 253 L 612 262 L 596 271 Z" fill="#f9a8d4" stroke="none"/>
  </g>

  <!-- 文字提示导航条 -->
  <g transform="translate(888 176)" font-family="'PingFang SC','Microsoft YaHei',sans-serif">
    <rect x="0" y="0" width="232" height="176" rx="16" fill="rgba(196,181,253,0.08)" stroke="#c4b5fd" stroke-opacity="0.45"/>
    <text x="24" y="42" font-size="18" font-weight="700" fill="#c4b5fd">文字提示</text>
    <rect x="24" y="60" width="184" height="40" rx="10" fill="rgba(249,168,212,0.12)" stroke="#f9a8d4" stroke-opacity="0.5"/>
    <text x="116" y="86" font-size="18" font-weight="700" fill="#f9a8d4" text-anchor="middle">「日落雪山」</text>
    <text x="24" y="132" font-size="15" font-weight="600" fill="#9385b8">每一步去噪</text>
    <text x="24" y="156" font-size="15" font-weight="600" fill="#9385b8">都朝提示词导航 →</text>
  </g>
  <!-- 导航虚线连到帧3 -->
  <path d="M888 264 C 866 264, 860 262, 840 262" stroke="#c4b5fd" stroke-opacity="0.5" stroke-width="2.5" stroke-dasharray="6 6" fill="none"/>

  <text x="76" y="556" font-family="Inter, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="56" font-weight="800" fill="url(#dfCap)">扩散模型</text>
  <text x="80" y="602" font-family="Inter, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="27" font-weight="600" fill="#8b82ad">AI 绘画和视频是怎么「画」出来的</text>
</svg>
