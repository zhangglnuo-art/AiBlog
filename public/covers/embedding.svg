<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" fill="none">
  <defs>
    <linearGradient id="ebBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07110e"/>
      <stop offset="1" stop-color="#0a1016"/>
    </linearGradient>
    <linearGradient id="ebCap" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7dffc4"/>
      <stop offset="0.5" stop-color="#38e8ff"/>
      <stop offset="1" stop-color="#6f9bff"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="675" fill="url(#ebBg)"/>

  <!-- 向量空间坐标网格 -->
  <g stroke="#3a5a52" stroke-opacity="0.25" stroke-width="1">
    <line x1="470" y1="70" x2="470" y2="470"/>
    <line x1="470" y1="470" x2="1140" y2="470"/>
    <g stroke-dasharray="4 8">
      <line x1="560" y1="70" x2="560" y2="470"/><line x1="650" y1="70" x2="650" y2="470"/>
      <line x1="740" y1="70" x2="740" y2="470"/><line x1="830" y1="70" x2="830" y2="470"/>
      <line x1="920" y1="70" x2="920" y2="470"/><line x1="1010" y1="70" x2="1010" y2="470"/><line x1="1100" y1="70" x2="1100" y2="470"/>
      <line x1="470" y1="150" x2="1140" y2="150"/><line x1="470" y1="230" x2="1140" y2="230"/>
      <line x1="470" y1="310" x2="1140" y2="310"/><line x1="470" y1="390" x2="1140" y2="390"/>
    </g>
  </g>

  <!-- 簇 A：宠物（绿） 猫/狗 相近 -->
  <g fill="#7dffc4">
    <circle cx="600" cy="180" r="9"/><circle cx="648" cy="205" r="9"/>
    <circle cx="590" cy="230" r="6" opacity="0.7"/><circle cx="655" cy="160" r="6" opacity="0.7"/><circle cx="628" cy="250" r="6" opacity="0.7"/>
  </g>
  <line x1="600" y1="180" x2="648" y2="205" stroke="#7dffc4" stroke-opacity="0.5" stroke-width="2" stroke-dasharray="5 5"/>
  <g font-family="Inter,'PingFang SC','Microsoft YaHei',sans-serif" font-size="20" font-weight="700" fill="#a7f5d5">
    <text x="560" y="176">猫</text><text x="662" y="210">狗</text>
  </g>

  <!-- 簇 B：城市（蓝） -->
  <g fill="#6f9bff">
    <circle cx="880" cy="150" r="9"/><circle cx="930" cy="175" r="9"/><circle cx="905" cy="120" r="6" opacity="0.7"/>
    <circle cx="955" cy="140" r="6" opacity="0.7"/><circle cx="895" cy="195" r="6" opacity="0.7"/>
  </g>
  <text x="960" y="175" font-family="Inter,'PingFang SC','Microsoft YaHei',sans-serif" font-size="20" font-weight="700" fill="#b9c8ff">城市簇</text>

  <!-- 簇 C：汽车（橙），远离 -->
  <g fill="#ff9d5c">
    <circle cx="1000" cy="400" r="9"/><circle cx="1045" cy="380" r="6" opacity="0.7"/><circle cx="1030" cy="425" r="6" opacity="0.7"/>
  </g>
  <text x="900" y="406" font-family="Inter,'PingFang SC','Microsoft YaHei',sans-serif" font-size="20" font-weight="700" fill="#ffc39a">汽车（远）</text>

  <text x="80" y="230" font-family="Inter, 'Segoe UI', sans-serif" font-size="24" letter-spacing="6" font-weight="600" fill="#7dffc4">// AI 原理</text>
  <text x="76" y="356" font-family="Inter, 'Segoe UI', sans-serif" font-size="82" font-weight="800" fill="url(#ebCap)">Embedding</text>
  <text x="80" y="418" font-family="Inter, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="30" font-weight="600" fill="#9ec7bd">向量 · 把语义变成可计算的坐标</text>

  <g stroke="#38e8ff" stroke-opacity="0.5" stroke-width="2" fill="none">
    <path d="M80 468 h120"/>
    <circle cx="215" cy="468" r="5" fill="#38e8ff" stroke="none"/>
  </g>
</svg>
