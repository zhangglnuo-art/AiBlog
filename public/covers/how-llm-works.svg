<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" fill="none">
  <defs>
    <linearGradient id="hwBg" x1="0" y1="0" x2="0.7" y2="1">
      <stop offset="0" stop-color="#080b1c"/>
      <stop offset="1" stop-color="#0a1024"/>
    </linearGradient>
    <radialGradient id="hwGlow" cx="0.62" cy="0.35" r="0.4">
      <stop offset="0" stop-color="#2540b8" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#2540b8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="hwCap" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38e8ff"/>
      <stop offset="1" stop-color="#8ab4ff"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="675" fill="url(#hwBg)"/>
  <rect width="1200" height="675" fill="url(#hwGlow)"/>

  <text x="80" y="110" font-family="Inter, 'Segoe UI', sans-serif" font-size="24" letter-spacing="6" font-weight="600" fill="#8ab4ff">// AI 原理</text>

  <!-- token 接龙：已知词 → 预测下一个 -->
  <g font-family="Inter, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="30" font-weight="700">
    <g>
      <rect x="90"  y="250" width="130" height="72" rx="14" fill="rgba(111,155,255,0.12)" stroke="#6f9bff" stroke-opacity="0.5"/>
      <text x="155" y="296" fill="#c7d5ff" text-anchor="middle">今天</text>
      <rect x="240" y="250" width="130" height="72" rx="14" fill="rgba(111,155,255,0.12)" stroke="#6f9bff" stroke-opacity="0.5"/>
      <text x="305" y="296" fill="#c7d5ff" text-anchor="middle">天气</text>
      <rect x="390" y="250" width="100" height="72" rx="14" fill="rgba(111,155,255,0.12)" stroke="#6f9bff" stroke-opacity="0.5"/>
      <text x="440" y="296" fill="#c7d5ff" text-anchor="middle">真</text>
    </g>
    <!-- 箭头 -->
    <g stroke="#8ab4ff" stroke-width="3" fill="none">
      <path d="M508 286 H 566"/>
      <path d="M556 278 L 570 286 L 556 294" stroke-linejoin="round"/>
    </g>
    <!-- 预测出的下一个词（高亮） -->
    <rect x="588" y="244" width="150" height="84" rx="16" fill="rgba(56,232,255,0.16)" stroke="#38e8ff" stroke-width="2"/>
    <text x="663" y="296" fill="#8be9ff" text-anchor="middle">好</text>

    <!-- 候选概率 -->
    <g font-size="20" font-weight="600">
      <rect x="770" y="230" width="150" height="34" rx="9" fill="rgba(255,255,255,0.05)"/>
      <text x="786" y="254" fill="#8be9ff">好</text><text x="904" y="254" fill="#7fd8c0" text-anchor="end">72%</text>
      <rect x="770" y="272" width="150" height="34" rx="9" fill="rgba(255,255,255,0.05)"/>
      <text x="786" y="296" fill="#b9c8ff">不错</text><text x="904" y="296" fill="#8fa0bf" text-anchor="end">15%</text>
      <rect x="770" y="314" width="150" height="34" rx="9" fill="rgba(255,255,255,0.05)"/>
      <text x="786" y="338" fill="#b9c8ff">冷</text><text x="904" y="338" fill="#8fa0bf" text-anchor="end">6%</text>
    </g>
  </g>

  <text x="80" y="470" font-family="Inter, 'Segoe UI', sans-serif" font-size="20" letter-spacing="2" font-weight="600" fill="#5f79b8">predict the next token</text>

  <text x="76" y="556" font-family="Inter, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="56" font-weight="800" fill="url(#hwCap)">大模型是怎么工作的</text>
  <text x="80" y="602" font-family="Inter, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="28" font-weight="600" fill="#8ea6d6">Transformer · 预测下一个词</text>
</svg>
