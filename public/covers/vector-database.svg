<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" fill="none">
  <defs>
    <linearGradient id="vdBg" x1="0" y1="0" x2="0.7" y2="1">
      <stop offset="0" stop-color="#070c18"/>
      <stop offset="1" stop-color="#0a1120"/>
    </linearGradient>
    <linearGradient id="vdCyl" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#4d7cff"/>
    </linearGradient>
    <linearGradient id="vdCap" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38e8ff"/>
      <stop offset="1" stop-color="#8ab4ff"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="675" fill="url(#vdBg)"/>
  <text x="80" y="96" font-family="Inter, 'Segoe UI', sans-serif" font-size="24" letter-spacing="6" font-weight="600" fill="#38e8ff">// AI 原理</text>

  <!-- 数据库圆柱 -->
  <g transform="translate(770 300)">
    <path d="M-110 -110 V 110 A 110 34 0 0 0 110 110 V -110" fill="#0e1a2e" stroke="#38e8ff" stroke-opacity="0.45" stroke-width="2"/>
    <ellipse cx="0" cy="-110" rx="110" ry="34" fill="#12233c" stroke="#38e8ff" stroke-opacity="0.55" stroke-width="2"/>
    <ellipse cx="0" cy="-46" rx="110" ry="30" fill="none" stroke="#2a4a72" stroke-opacity="0.6"/>
    <ellipse cx="0" cy="18" rx="110" ry="30" fill="none" stroke="#2a4a72" stroke-opacity="0.6"/>
    <ellipse cx="0" cy="82" rx="110" ry="30" fill="none" stroke="#2a4a72" stroke-opacity="0.6"/>
    <!-- 向量数值点缀 -->
    <g font-family="'JetBrains Mono',Consolas,monospace" font-size="15" fill="#8be9ff" text-anchor="middle">
      <text x="0" y="-98" fill="#8be9ff">[0.2, 0.8, …]</text>
      <text x="0" y="-34" fill="#9fb0d6">[0.5, 0.1, …]</text>
      <text x="0" y="30" fill="#9fb0d6">[0.9, 0.3, …]</text>
    </g>
  </g>

  <!-- 查询 → 最近邻 -->
  <g transform="translate(430 300)">
    <rect x="-120" y="-30" width="180" height="60" rx="14" fill="rgba(56,232,255,0.1)" stroke="#38e8ff" stroke-opacity="0.5"/>
    <text x="-30" y="8" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="22" font-weight="700" fill="#8be9ff" text-anchor="middle">查询向量</text>
    <g stroke="#8ab4ff" stroke-width="3" fill="none">
      <path d="M60 0 H 220"/>
      <path d="M208 -10 L 224 0 L 208 10" stroke-linejoin="round"/>
    </g>
    <text x="150" y="-16" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="17" font-weight="600" fill="#7fd8c0" text-anchor="middle">找最相似</text>
  </g>

  <text x="76" y="516" font-family="Inter, 'Segoe UI', sans-serif" font-size="72" font-weight="800" fill="url(#vdCap)">Vector DB</text>
  <text x="80" y="566" font-family="Inter, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="30" font-weight="600" fill="#8ea6d6">向量数据库 · RAG 的记忆仓库</text>
</svg>
