<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" fill="none">
  <defs>
    <linearGradient id="pxBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#04120f"/>
      <stop offset="1" stop-color="#05191c"/>
    </linearGradient>
    <radialGradient id="pxGlow" cx="0.3" cy="0.2" r="0.7">
      <stop offset="0" stop-color="#0e5c4f" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#0e5c4f" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="pxCap" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#5eead4"/>
      <stop offset="1" stop-color="#2dd4bf"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="675" fill="url(#pxBg)"/>
  <rect width="1200" height="675" fill="url(#pxGlow)"/>

  <!-- 搜索框 -->
  <g transform="translate(150 120)">
    <rect x="0" y="0" width="900" height="76" rx="38" fill="#0a2422" stroke="#2dd4bf" stroke-opacity="0.55" stroke-width="2"/>
    <g transform="translate(40 38)" stroke="#5eead4" stroke-width="4" fill="none">
      <circle cx="0" cy="0" r="15"/>
      <line x1="11" y1="11" x2="26" y2="26" stroke-linecap="round"/>
    </g>
    <text x="92" y="47" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="26" fill="#cdefe8">为什么天空是蓝色的？</text>
    <rect x="470" y="24" width="3" height="30" fill="#5eead4"/>
  </g>

  <!-- 答案卡片 + 来源引用 -->
  <g transform="translate(150 232)">
    <rect x="0" y="0" width="900" height="196" rx="18" fill="rgba(255,255,255,0.03)" stroke="#ffffff" stroke-opacity="0.08"/>
    <g stroke-linecap="round" stroke-width="7">
      <line x1="34" y1="42" x2="720" y2="42" stroke="#5eead4"/>
      <line x1="34" y1="74" x2="820" y2="74" stroke="#2dd4bf" stroke-opacity="0.55"/>
      <line x1="34" y1="106" x2="600" y2="106" stroke="#2dd4bf" stroke-opacity="0.55"/>
    </g>
    <!-- 来源 pills -->
    <g font-family="Inter, sans-serif" font-size="15" font-weight="700">
      <g><rect x="34" y="140" width="140" height="34" rx="10" fill="rgba(94,234,212,0.12)" stroke="#5eead4" stroke-opacity="0.4"/><circle cx="54" cy="157" r="8" fill="#5eead4"/><text x="72" y="162" fill="#a7efe2">来源 1</text></g>
      <g><rect x="188" y="140" width="140" height="34" rx="10" fill="rgba(94,234,212,0.12)" stroke="#5eead4" stroke-opacity="0.4"/><circle cx="208" cy="157" r="8" fill="#38e8ff"/><text x="226" y="162" fill="#a7efe2">来源 2</text></g>
      <g><rect x="342" y="140" width="140" height="34" rx="10" fill="rgba(94,234,212,0.12)" stroke="#5eead4" stroke-opacity="0.4"/><circle cx="362" cy="157" r="8" fill="#6f9bff"/><text x="380" y="162" fill="#a7efe2">来源 3</text></g>
    </g>
  </g>

  <text x="150" y="560" font-family="Inter, 'Segoe UI', sans-serif" font-size="58" font-weight="800" fill="url(#pxCap)">Perplexity</text>
  <text x="470" y="560" font-family="Inter, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="28" font-weight="600" fill="#7fb8ac">国内开通 AI 搜索全流程</text>
</svg>
