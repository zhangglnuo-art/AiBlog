<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" fill="none">
  <defs>
    <linearGradient id="pxTitle" x1="0" y1="0" x2="1" y2="0.4">
      <stop offset="0" stop-color="#5eead4"/>
      <stop offset="0.5" stop-color="#38e8ff"/>
      <stop offset="1" stop-color="#6f9bff"/>
    </linearGradient>
    <radialGradient id="pxA" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#2dd4bf" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#2dd4bf" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="pxB" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#38e8ff" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#38e8ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="pxC" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#3366ff" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#3366ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="pxVign" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#05070f" stop-opacity="0"/>
      <stop offset="1" stop-color="#05070f" stop-opacity="0.5"/>
    </linearGradient>
    <pattern id="pxGrid" width="46" height="46" patternUnits="userSpaceOnUse">
      <path d="M46 0H0V46" fill="none" stroke="#78a0ff" stroke-opacity="0.08" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="675" fill="#05070f"/>
  <circle cx="210" cy="160" r="340" fill="url(#pxA)"/>
  <circle cx="1010" cy="250" r="320" fill="url(#pxB)"/>
  <circle cx="640" cy="630" r="300" fill="url(#pxC)"/>
  <rect width="1200" height="675" fill="url(#pxGrid)"/>
  <rect width="1200" height="675" fill="url(#pxVign)"/>

  <!-- 答案卡片 + 带来源引用的检索意象 -->
  <g transform="translate(840 155)">
    <rect x="0" y="0" width="290" height="210" rx="14" fill="#0b1220" stroke="#ffffff" stroke-opacity="0.12"/>
    <g stroke-width="6" stroke-linecap="round">
      <line x1="26" y1="42" x2="210" y2="42" stroke="#5eead4"/>
      <line x1="26" y1="72" x2="250" y2="72" stroke="#38e8ff" stroke-opacity="0.6"/>
      <line x1="26" y1="102" x2="180" y2="102" stroke="#38e8ff" stroke-opacity="0.6"/>
    </g>
    <!-- 来源引用小标 -->
    <g font-family="Inter, sans-serif" font-size="15" font-weight="700" fill="#05070f">
      <circle cx="40" cy="150" r="14" fill="#5eead4"/><text x="40" y="155" text-anchor="middle">1</text>
      <circle cx="78" cy="150" r="14" fill="#38e8ff"/><text x="78" y="155" text-anchor="middle">2</text>
      <circle cx="116" cy="150" r="14" fill="#6f9bff"/><text x="116" y="155" text-anchor="middle">3</text>
    </g>
    <!-- 放大镜 -->
    <g transform="translate(210 150)" stroke="#5eead4" stroke-width="7" fill="none">
      <circle cx="0" cy="0" r="26"/>
      <line x1="19" y1="19" x2="44" y2="44" stroke-linecap="round"/>
    </g>
  </g>

  <text x="80" y="250" font-family="Inter, 'Segoe UI', sans-serif" font-size="26" letter-spacing="6" font-weight="600" fill="#5eead4">// AI 订阅指南</text>
  <text x="76" y="372" font-family="Inter, 'Segoe UI', sans-serif" font-size="98" font-weight="800" fill="url(#pxTitle)">Perplexity</text>
  <text x="80" y="442" font-family="Inter, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="34" font-weight="600" fill="#c3ccdf">国内开通 AI 搜索全流程</text>

  <g stroke="#5eead4" stroke-opacity="0.5" stroke-width="2" fill="none">
    <path d="M80 492 h120"/>
    <circle cx="215" cy="492" r="5" fill="#5eead4" stroke="none"/>
  </g>
</svg>
