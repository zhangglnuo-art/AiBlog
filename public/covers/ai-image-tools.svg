<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" fill="none">
  <defs>
    <linearGradient id="itBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0c0913"/>
      <stop offset="1" stop-color="#0f0a14"/>
    </linearGradient>
    <linearGradient id="itA" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#a78bfa"/><stop offset="1" stop-color="#7c3aed"/></linearGradient>
    <linearGradient id="itB" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#34d399"/><stop offset="1" stop-color="#0ea5e9"/></linearGradient>
    <linearGradient id="itC" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#f472b6"/><stop offset="1" stop-color="#fb7185"/></linearGradient>
    <linearGradient id="itD" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#fbbf24"/><stop offset="1" stop-color="#f97316"/></linearGradient>
    <linearGradient id="itCap" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#c4b5fd"/><stop offset="0.5" stop-color="#f472b6"/><stop offset="1" stop-color="#fbbf24"/></linearGradient>
  </defs>

  <rect width="1200" height="675" fill="url(#itBg)"/>
  <text x="80" y="90" font-family="Inter, 'Segoe UI', sans-serif" font-size="24" letter-spacing="6" font-weight="600" fill="#c4b5fd">// AI 对比</text>

  <!-- 同一句 prompt -->
  <g transform="translate(80 118)">
    <rect x="0" y="0" width="1040" height="58" rx="14" fill="rgba(255,255,255,0.05)" stroke="#a78bfa" stroke-opacity="0.4"/>
    <text x="24" y="37" font-family="'JetBrains Mono',Consolas,monospace" font-size="20" font-weight="700" fill="#c4b5fd">prompt</text>
    <text x="128" y="37" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="21" fill="#d8cbe6">一只戴宇航头盔的柴犬，赛博朋克</text>
    <text x="1016" y="37" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="20" fill="#8a7fa8" text-anchor="end">→ 四款结果</text>
  </g>

  <!-- 四款工具出图 -->
  <g font-family="Inter, sans-serif" font-size="19" font-weight="800" text-anchor="middle">
    <g transform="translate(80 200)">
      <rect x="0" y="0" width="242" height="200" rx="14" fill="url(#itA)"/>
      <circle cx="121" cy="86" r="34" fill="rgba(0,0,0,0.18)"/><circle cx="121" cy="86" r="16" fill="rgba(255,255,255,0.6)"/>
      <rect x="0" y="158" width="242" height="42" rx="0" fill="rgba(0,0,0,0.35)"/>
      <text x="121" y="185" fill="#fff">Midjourney</text>
    </g>
    <g transform="translate(346 200)">
      <rect x="0" y="0" width="242" height="200" rx="14" fill="url(#itB)"/>
      <circle cx="121" cy="86" r="34" fill="rgba(0,0,0,0.18)"/><circle cx="121" cy="86" r="16" fill="rgba(255,255,255,0.6)"/>
      <rect x="0" y="158" width="242" height="42" fill="rgba(0,0,0,0.35)"/>
      <text x="121" y="185" fill="#fff">DALL·E</text>
    </g>
    <g transform="translate(612 200)">
      <rect x="0" y="0" width="242" height="200" rx="14" fill="url(#itC)"/>
      <circle cx="121" cy="86" r="34" fill="rgba(0,0,0,0.18)"/><circle cx="121" cy="86" r="16" fill="rgba(255,255,255,0.6)"/>
      <rect x="0" y="158" width="242" height="42" fill="rgba(0,0,0,0.35)"/>
      <text x="121" y="185" fill="#fff">Stable Diffusion</text>
    </g>
    <g transform="translate(878 200)">
      <rect x="0" y="0" width="242" height="200" rx="14" fill="url(#itD)"/>
      <circle cx="121" cy="86" r="34" fill="rgba(0,0,0,0.18)"/><circle cx="121" cy="86" r="16" fill="rgba(255,255,255,0.6)"/>
      <rect x="0" y="158" width="242" height="42" fill="rgba(0,0,0,0.35)"/>
      <text x="121" y="185" fill="#fff">Ideogram</text>
    </g>
  </g>

  <text x="80" y="500" font-family="Inter, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="58" font-weight="800" fill="url(#itCap)">AI 绘画工具怎么选</text>
  <text x="84" y="546" font-family="Inter, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="28" font-weight="600" fill="#9b8fb8">Midjourney · DALL·E · SD · Ideogram 横评</text>
</svg>
