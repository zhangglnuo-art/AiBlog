<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" fill="none">
  <defs>
    <linearGradient id="clTitle" x1="0" y1="0" x2="1" y2="0.4">
      <stop offset="0" stop-color="#38e8ff"/>
      <stop offset="0.5" stop-color="#6f9bff"/>
      <stop offset="1" stop-color="#b06bff"/>
    </linearGradient>
    <radialGradient id="clA" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#38e8ff" stop-opacity="0.48"/>
      <stop offset="1" stop-color="#38e8ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="clB" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#b06bff" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#b06bff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="clC" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#3366ff" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#3366ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="clVign" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#05070f" stop-opacity="0"/>
      <stop offset="1" stop-color="#05070f" stop-opacity="0.5"/>
    </linearGradient>
    <pattern id="clGrid" width="46" height="46" patternUnits="userSpaceOnUse">
      <path d="M46 0H0V46" fill="none" stroke="#78a0ff" stroke-opacity="0.08" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="675" fill="#05070f"/>
  <circle cx="230" cy="170" r="340" fill="url(#clA)"/>
  <circle cx="1000" cy="250" r="320" fill="url(#clB)"/>
  <circle cx="640" cy="630" r="300" fill="url(#clC)"/>
  <rect width="1200" height="675" fill="url(#clGrid)"/>
  <rect width="1200" height="675" fill="url(#clVign)"/>

  <!-- 三层：提示词 / RAG / 微调 -->
  <g transform="translate(858 128)" font-family="Inter, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="20" font-weight="700">
    <rect x="0" y="0"  width="300" height="56" rx="12" fill="rgba(56,232,255,0.12)" stroke="#38e8ff" stroke-opacity="0.6"/>
    <text x="24" y="36" fill="#8be9ff">提示词  Prompt</text>
    <rect x="0" y="72" width="300" height="56" rx="12" fill="rgba(111,155,255,0.12)" stroke="#6f9bff" stroke-opacity="0.6"/>
    <text x="24" y="108" fill="#b9c8ff">检索增强  RAG</text>
    <rect x="0" y="144" width="300" height="56" rx="12" fill="rgba(176,107,255,0.12)" stroke="#b06bff" stroke-opacity="0.6"/>
    <text x="24" y="180" fill="#d7bcff">微调  Fine-tune</text>
  </g>

  <text x="80" y="248" font-family="Inter, 'Segoe UI', sans-serif" font-size="26" letter-spacing="6" font-weight="600" fill="#38e8ff">// AI 原理</text>
  <text x="76" y="360" font-family="Inter, 'Segoe UI', sans-serif" font-size="58" font-weight="800" fill="url(#clTitle)">Prompt · RAG · Fine-tune</text>
  <text x="80" y="430" font-family="Inter, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="34" font-weight="600" fill="#c3ccdf">给大模型喂知识的三种方式</text>

  <g stroke="#38e8ff" stroke-opacity="0.5" stroke-width="2" fill="none">
    <path d="M80 480 h120"/>
    <circle cx="215" cy="480" r="5" fill="#38e8ff" stroke="none"/>
  </g>
</svg>
