<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" fill="none">
  <defs>
    <linearGradient id="clBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0e1a"/>
      <stop offset="1" stop-color="#0c1120"/>
    </linearGradient>
    <radialGradient id="clHex" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#bcd3ff"/>
      <stop offset="0.5" stop-color="#4d7cff"/>
      <stop offset="1" stop-color="#1834a6"/>
    </radialGradient>
    <linearGradient id="clCap" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38e8ff"/>
      <stop offset="0.5" stop-color="#6f9bff"/>
      <stop offset="1" stop-color="#b06bff"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="675" fill="url(#clBg)"/>

  <text x="80" y="112" font-family="Inter, 'Segoe UI', sans-serif" font-size="24" letter-spacing="6" font-weight="600" fill="#6f9bff">// AI 原理</text>

  <!-- 流程图：三种方式 → 汇入 LLM -->
  <g>
    <!-- 连线（先画，位于节点下方） -->
    <g fill="none" stroke-width="3">
      <path d="M372 208 C 500 208, 540 300, 636 300" stroke="#38e8ff" stroke-opacity="0.7"/>
      <path d="M372 300 L 636 300" stroke="#6f9bff" stroke-opacity="0.7"/>
      <path d="M372 392 C 500 392, 540 300, 636 300" stroke="#b06bff" stroke-opacity="0.7"/>
    </g>

    <!-- 三个来源节点 -->
    <g font-family="Inter, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="24" font-weight="700">
      <rect x="92" y="176" width="280" height="64" rx="14" fill="rgba(56,232,255,0.10)" stroke="#38e8ff" stroke-opacity="0.6"/>
      <text x="118" y="215" fill="#8be9ff">提示词  Prompt</text>
      <rect x="92" y="268" width="280" height="64" rx="14" fill="rgba(111,155,255,0.10)" stroke="#6f9bff" stroke-opacity="0.6"/>
      <text x="118" y="307" fill="#b9c8ff">检索增强  RAG</text>
      <rect x="92" y="360" width="280" height="64" rx="14" fill="rgba(176,107,255,0.10)" stroke="#b06bff" stroke-opacity="0.6"/>
      <text x="118" y="399" fill="#d7bcff">微调  Fine-tune</text>
    </g>

    <!-- 中心 LLM 六边形 -->
    <g transform="translate(720 300)">
      <polygon points="0,-84 73,-42 73,42 0,84 -73,42 -73,-42" fill="url(#clHex)" stroke="#bcd3ff" stroke-opacity="0.5" stroke-width="2"/>
      <text x="0" y="10" font-family="Inter, sans-serif" font-size="30" font-weight="800" fill="#ffffff" text-anchor="middle">LLM</text>
    </g>

    <!-- 输出箭头 + 结果 -->
    <g fill="none" stroke="#8ea6d6" stroke-width="3">
      <path d="M800 300 H 900"/>
      <path d="M888 290 L 902 300 L 888 310" stroke-linejoin="round"/>
    </g>
    <g transform="translate(912 268)">
      <rect x="0" y="0" width="196" height="64" rx="14" fill="rgba(255,255,255,0.04)" stroke="#ffffff" stroke-opacity="0.1"/>
      <text x="24" y="40" font-family="Inter, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="22" font-weight="700" fill="#cdd7ee">更懂你的 AI</text>
    </g>
  </g>

  <text x="72" y="560" font-family="Inter, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="58" font-weight="800" fill="url(#clCap)">定制大模型</text>
  <text x="76" y="606" font-family="Inter, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="28" font-weight="600" fill="#8ea6d6">微调、RAG、提示词，给 AI 喂知识的三种方式</text>
</svg>
