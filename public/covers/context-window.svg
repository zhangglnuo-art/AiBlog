<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" fill="none">
  <defs>
    <linearGradient id="cwBg" x1="0" y1="0" x2="0.6" y2="1">
      <stop offset="0" stop-color="#080b1e"/>
      <stop offset="1" stop-color="#0a1030"/>
    </linearGradient>
    <radialGradient id="cwGlow" cx="0.5" cy="0.42" r="0.5">
      <stop offset="0" stop-color="#2a3ea0" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#2a3ea0" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="cwCap" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#8ab4ff"/>
      <stop offset="1" stop-color="#5eead4"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="675" fill="url(#cwBg)"/>
  <rect width="1200" height="675" fill="url(#cwGlow)"/>

  <!-- 全幅 token 缎带：中段被窗口框住高亮，两端渐隐（被挤出窗口） -->
  <g transform="translate(0 250)">
    <!-- 使用一排方块，透明度从两端到中间递增 -->
    <g>
      <rect x="30"  y="0" width="44" height="44" rx="9" fill="#28345e" opacity="0.35"/>
      <rect x="90"  y="0" width="44" height="44" rx="9" fill="#28345e" opacity="0.5"/>
      <rect x="150" y="0" width="44" height="44" rx="9" fill="#2f3f72" opacity="0.7"/>
      <rect x="210" y="0" width="44" height="44" rx="9" fill="#33447d"/>
      <rect x="270" y="0" width="44" height="44" rx="9" fill="#3a4f8f"/>
      <!-- 窗口内高亮 -->
      <rect x="360" y="0" width="44" height="44" rx="9" fill="#38e8ff"/>
      <rect x="420" y="0" width="44" height="44" rx="9" fill="#6f9bff"/>
      <rect x="480" y="0" width="44" height="44" rx="9" fill="#8ab4ff"/>
      <rect x="540" y="0" width="44" height="44" rx="9" fill="#5eead4"/>
      <rect x="600" y="0" width="44" height="44" rx="9" fill="#6f9bff"/>
      <rect x="660" y="0" width="44" height="44" rx="9" fill="#38e8ff"/>
      <rect x="720" y="0" width="44" height="44" rx="9" fill="#8ab4ff"/>
      <!-- 窗口外 -->
      <rect x="810" y="0" width="44" height="44" rx="9" fill="#3a4f8f"/>
      <rect x="870" y="0" width="44" height="44" rx="9" fill="#33447d"/>
      <rect x="930" y="0" width="44" height="44" rx="9" fill="#2f3f72" opacity="0.7"/>
      <rect x="990" y="0" width="44" height="44" rx="9" fill="#28345e" opacity="0.5"/>
      <rect x="1050" y="0" width="44" height="44" rx="9" fill="#28345e" opacity="0.35"/>
      <rect x="1110" y="0" width="44" height="44" rx="9" fill="#28345e" opacity="0.22"/>
    </g>
    <!-- 上下文窗口框 -->
    <rect x="345" y="-22" width="435" height="88" rx="14" fill="none" stroke="#38e8ff" stroke-width="3"/>
    <text x="562" y="102" font-family="Inter, sans-serif" font-size="20" font-weight="600" fill="#8be9ff" text-anchor="middle" letter-spacing="2">context window</text>
  </g>

  <text x="72" y="112" font-family="Inter, 'Segoe UI', sans-serif" font-size="24" letter-spacing="6" font-weight="600" fill="#8ab4ff">// AI 原理</text>
  <text x="70" y="512" font-family="Inter, 'Segoe UI', sans-serif" font-size="82" font-weight="800" fill="url(#cwCap)">Context Window</text>
  <text x="74" y="566" font-family="Inter, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="30" font-weight="600" fill="#8ea6d6">上下文窗口 · AI 的记忆边界</text>
</svg>
