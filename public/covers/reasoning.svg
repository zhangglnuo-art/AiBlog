<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" fill="none">
  <defs>
    <linearGradient id="rsBg" x1="0" y1="0" x2="0.7" y2="1">
      <stop offset="0" stop-color="#080c1a"/>
      <stop offset="1" stop-color="#0b0f22"/>
    </linearGradient>
    <linearGradient id="rsCap" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#a5b4fc"/>
      <stop offset="1" stop-color="#fcd34d"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="675" fill="url(#rsBg)"/>
  <text x="80" y="92" font-family="Inter, 'Segoe UI', sans-serif" font-size="24" letter-spacing="6" font-weight="600" fill="#a5b4fc">// AI 原理</text>

  <!-- 问题 -->
  <g transform="translate(80 246)" font-family="'PingFang SC','Microsoft YaHei',sans-serif">
    <rect x="0" y="0" width="220" height="66" rx="14" fill="rgba(165,180,252,0.1)" stroke="#a5b4fc" stroke-opacity="0.5"/>
    <text x="110" y="42" font-size="23" font-weight="700" fill="#c7d2fe" text-anchor="middle">这道难题？</text>
  </g>
  <g stroke="#a5b4fc" stroke-opacity="0.6" stroke-width="3" fill="none">
    <path d="M304 279 H 356"/>
    <path d="M346 271 L 360 279 L 346 287" stroke-linejoin="round"/>
  </g>

  <!-- 思考框（虚线气泡） -->
  <g transform="translate(370 150)" font-family="'PingFang SC','Microsoft YaHei',sans-serif">
    <rect x="0" y="0" width="520" height="260" rx="24" fill="rgba(165,180,252,0.05)" stroke="#a5b4fc" stroke-opacity="0.55" stroke-width="2.5" stroke-dasharray="10 9"/>
    <text x="28" y="42" font-size="19" font-weight="700" fill="#8b96d8">思考中 · 12s</text>
    <circle cx="470" cy="34" r="5" fill="#a5b4fc"><animate attributeName="opacity" values="1;0.2;1" dur="1s" repeatCount="indefinite"/></circle>

    <!-- 步骤链 -->
    <g font-size="21" font-weight="700" text-anchor="middle">
      <rect x="36" y="88" width="130" height="58" rx="12" fill="rgba(199,210,254,0.09)" stroke="#8b96d8" stroke-opacity="0.5"/>
      <text x="101" y="124" fill="#c7d2fe">拆解</text>
      <rect x="196" y="88" width="130" height="58" rx="12" fill="rgba(199,210,254,0.09)" stroke="#8b96d8" stroke-opacity="0.5"/>
      <text x="261" y="124" fill="#c7d2fe">尝试</text>
      <rect x="356" y="88" width="130" height="58" rx="12" fill="rgba(199,210,254,0.09)" stroke="#8b96d8" stroke-opacity="0.5"/>
      <text x="421" y="124" fill="#c7d2fe">检查</text>
    </g>
    <g stroke="#8b96d8" stroke-opacity="0.7" stroke-width="3" fill="none">
      <path d="M166 117 H 190"/><path d="M184 110 L 194 117 L 184 124" stroke-linejoin="round"/>
      <path d="M326 117 H 350"/><path d="M344 110 L 354 117 L 344 124" stroke-linejoin="round"/>
    </g>
    <!-- 自我纠错回环 -->
    <g stroke="#fcd34d" stroke-opacity="0.8" stroke-width="3" fill="none">
      <path d="M421 154 C 421 208, 261 208, 261 154"/>
      <path d="M252 166 L 261 150 L 271 166" stroke-linejoin="round"/>
    </g>
    <text x="341" y="228" font-size="18" font-weight="600" fill="#d9c476" text-anchor="middle">发现不对？回头重想</text>
  </g>

  <g stroke="#fcd34d" stroke-opacity="0.7" stroke-width="3" fill="none">
    <path d="M894 279 H 946"/>
    <path d="M936 271 L 950 279 L 936 287" stroke-linejoin="round"/>
  </g>
  <!-- 答案 -->
  <g transform="translate(958 240)" font-family="'PingFang SC','Microsoft YaHei',sans-serif">
    <rect x="0" y="0" width="162" height="78" rx="16" fill="rgba(252,211,77,0.12)" stroke="#fcd34d" stroke-width="2.5"/>
    <text x="81" y="48" font-size="26" font-weight="800" fill="#fde68a" text-anchor="middle">答案 ✓</text>
  </g>

  <text x="76" y="536" font-family="Inter, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="58" font-weight="800" fill="url(#rsCap)">推理模型</text>
  <text x="80" y="582" font-family="Inter, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="28" font-weight="600" fill="#8b96b8">AI「深度思考」背后的原理</text>
</svg>
