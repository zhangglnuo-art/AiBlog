<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" fill="none">
  <defs>
    <linearGradient id="mcBg" x1="0" y1="0" x2="0.8" y2="1">
      <stop offset="0" stop-color="#0b0f13"/>
      <stop offset="1" stop-color="#0d1218"/>
    </linearGradient>
    <linearGradient id="mcHub" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f97316"/>
      <stop offset="1" stop-color="#fbbf24"/>
    </linearGradient>
    <linearGradient id="mcCap" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#fbbf24"/>
      <stop offset="1" stop-color="#5eead4"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="675" fill="url(#mcBg)"/>
  <text x="80" y="88" font-family="Inter, 'Segoe UI', sans-serif" font-size="24" letter-spacing="6" font-weight="600" fill="#fbbf24">// AI 原理</text>

  <!-- 左：AI -->
  <g transform="translate(180 268)">
    <circle r="66" fill="rgba(94,234,212,0.08)" stroke="#5eead4" stroke-opacity="0.55" stroke-width="2"/>
    <text x="0" y="10" font-family="Inter, sans-serif" font-size="26" font-weight="800" fill="#7fe7d4" text-anchor="middle">AI</text>
  </g>
  <g stroke="#5eead4" stroke-opacity="0.6" stroke-width="4" fill="none">
    <path d="M250 268 H 372"/>
  </g>

  <!-- 中：MCP 枢纽（USB-C 隐喻） -->
  <g transform="translate(380 268)">
    <rect x="0" y="-58" width="132" height="116" rx="26" fill="url(#mcHub)" opacity="0.18" stroke="#fbbf24" stroke-width="3"/>
    <rect x="18" y="-26" width="96" height="52" rx="26" fill="none" stroke="#fbbf24" stroke-width="4"/>
    <rect x="38" y="-10" width="56" height="20" rx="10" fill="#fbbf24"/>
    <text x="66" y="92" font-family="Inter, sans-serif" font-size="26" font-weight="800" fill="#fcd34d" text-anchor="middle">MCP</text>
    <text x="66" y="122" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="17" font-weight="600" fill="#b99a5e" text-anchor="middle">统一连接标准</text>
  </g>

  <!-- 扇出到多个服务 -->
  <g stroke="#fbbf24" stroke-opacity="0.5" stroke-width="3" fill="none">
    <path d="M512 268 C 600 268, 620 140, 712 140"/>
    <path d="M512 268 C 600 268, 620 226, 712 226"/>
    <path d="M512 268 H 712"/>
    <path d="M512 268 C 600 268, 620 310, 712 310"/>
    <path d="M512 268 C 600 268, 620 396, 712 396"/>
  </g>

  <g font-family="Inter, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="21" font-weight="700">
    <g><rect x="712" y="112" width="240" height="56" rx="13" fill="rgba(94,234,212,0.09)" stroke="#5eead4" stroke-opacity="0.5"/><text x="738" y="148" fill="#7fe7d4">本地文件</text></g>
    <g><rect x="712" y="198" width="240" height="56" rx="13" fill="rgba(56,232,255,0.09)" stroke="#38e8ff" stroke-opacity="0.5"/><text x="738" y="234" fill="#8be9ff">数据库</text></g>
    <g><rect x="712" y="240" width="0" height="0"/></g>
    <g><rect x="712" y="284" width="240" height="56" rx="13" fill="rgba(111,155,255,0.09)" stroke="#6f9bff" stroke-opacity="0.5"/><text x="738" y="320" fill="#b9c8ff">代码仓库</text></g>
    <g><rect x="712" y="370" width="240" height="56" rx="13" fill="rgba(192,132,252,0.09)" stroke="#c084fc" stroke-opacity="0.5"/><text x="738" y="406" fill="#d8b4fe">内部 API</text></g>
  </g>

  <text x="76" y="530" font-family="Inter, 'Segoe UI', sans-serif" font-size="76" font-weight="800" fill="url(#mcCap)">MCP</text>
  <text x="80" y="580" font-family="Inter, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="28" font-weight="600" fill="#8b9099">让 AI 连上你的工具和数据</text>
</svg>
