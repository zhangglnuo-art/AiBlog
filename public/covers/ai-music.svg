<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" fill="none">
  <defs>
    <linearGradient id="amBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#160a22"/>
      <stop offset="1" stop-color="#1c0a1a"/>
    </linearGradient>
    <linearGradient id="amWave" gradientUnits="userSpaceOnUse" x1="150" y1="0" x2="1110" y2="0">
      <stop offset="0" stop-color="#38e8ff"/>
      <stop offset="0.4" stop-color="#b06bff"/>
      <stop offset="0.7" stop-color="#ff7eb3"/>
      <stop offset="1" stop-color="#ffd166"/>
    </linearGradient>
    <linearGradient id="amCap" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#c4b5ff"/>
      <stop offset="1" stop-color="#ff7eb3"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="675" fill="url(#amBg)"/>
  <text x="80" y="112" font-family="Inter, 'Segoe UI', sans-serif" font-size="24" letter-spacing="6" font-weight="600" fill="#c4b5ff">// AI 工具</text>

