<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" fill="none">
  <defs>
    <radialGradient id="agBg" cx="0.68" cy="0.42" r="0.75">
      <stop offset="0" stop-color="#1a0f34"/>
      <stop offset="1" stop-color="#0b0716"/>
    </radialGradient>
    <radialGradient id="agCore" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#f0c4ff"/>
      <stop offset="0.45" stop-color="#b06bff"/>
      <stop offset="1" stop-color="#6b21a8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="agCap" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#e9a5ff"/>
      <stop offset="1" stop-color="#8b7dff"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="675" fill="url(#agBg)"/>

  <!-- 轨道 + 工具节点，中心是「大脑核心」 -->
  <g transform="translate(830 320)">
    <g stroke="#b06bff" stroke-opacity="0.28" fill="none">
      <ellipse cx="0" cy="0" rx="250" ry="120" transform="rotate(-18)"/>
      <ellipse cx="0" cy="0" rx="180" ry="230" transform="rotate(24)"/>
      <circle r="150"/>
    </g>
    <!-- 核心 -->
    <circle r="120" fill="url(#agCore)"/>
    <circle r="54" fill="#1a0f34" stroke="#e9a5ff" stroke-opacity="0.6" stroke-width="2"/>
    <text x="0" y="8" font-family="Inter, sans-serif" font-size="22" font-weight="800" fill="#f0c4ff" text-anchor="middle">LLM</text>

    <!-- 工具节点 -->
    <g font-family="Inter, sans-serif" font-weight="800" text-anchor="middle">
      <!-- 搜索 -->
      <g transform="translate(238 -74)"><circle r="30" fill="#160c2e" stroke="#e9a5ff" stroke-opacity="0.5"/><g stroke="#e9a5ff" stroke-width="3" fill="none"><circle cx="-4" cy="-4" r="9"/><line x1="4" y1="4" x2="14" y2="14" stroke-linecap="round"/></g></g>
      <!-- 代码 -->
      <g transform="translate(150 210)"><circle r="30" fill="#160c2e" stroke="#8b7dff" stroke-opacity="0.6"/><text y="8" font-size="22" fill="#b9b0ff">&lt;/&gt;</text></g>
      <!-- 数据库 -->
      <g transform="translate(-215 120)"><circle r="30" fill="#160c2e" stroke="#c084fc" stroke-opacity="0.6"/><g fill="none" stroke="#e0b3ff" stroke-width="3"><ellipse cx="0" cy="-8" rx="12" ry="5"/><path d="M-12 -8 V8 a12 5 0 0 0 24 0 V-8"/></g></g>
      <!-- 齿轮 -->
      <g transform="translate(-150 -150)"><circle r="30" fill="#160c2e" stroke="#f0abfc" stroke-opacity="0.6"/><circle r="9" fill="none" stroke="#f5c9ff" stroke-width="3"/><g stroke="#f5c9ff" stroke-width="3" stroke-linecap="round"><line x1="0" y1="-16" x2="0" y2="-20"/><line x1="0" y1="16" x2="0" y2="20"/><line x1="-16" y1="0" x2="-20" y2="0"/><line x1="16" y1="0" x2="20" y2="0"/></g></g>
    </g>
  </g>

  <text x="80" y="230" font-family="Inter, 'Segoe UI', sans-serif" font-size="24" letter-spacing="6" font-weight="600" fill="#e9a5ff">// AI 原理</text>
  <text x="76" y="360" font-family="Inter, 'Segoe UI', sans-serif" font-size="112" font-weight="800" fill="url(#agCap)">AI Agent</text>
  <text x="80" y="426" font-family="Inter, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="32" font-weight="600" fill="#c8b6e8">智能体的原理与能力边界</text>
</svg>
