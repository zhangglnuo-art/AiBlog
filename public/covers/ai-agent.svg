<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" fill="none">
  <defs>
    <linearGradient id="agText" x1="0" y1="0" x2="1" y2="0.4">
      <stop offset="0" stop-color="#38e8ff"/>
      <stop offset="0.5" stop-color="#6f9bff"/>
      <stop offset="1" stop-color="#b06bff"/>
    </linearGradient>
    <radialGradient id="agOrbA" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#b06bff" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#b06bff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="agOrbB" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#38e8ff" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#38e8ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="agOrbC" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#3366ff" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#3366ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="agVign" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#05070f" stop-opacity="0"/>
      <stop offset="1" stop-color="#05070f" stop-opacity="0.55"/>
    </linearGradient>
    <pattern id="agGrid" width="46" height="46" patternUnits="userSpaceOnUse">
      <path d="M46 0H0V46" fill="none" stroke="#78a0ff" stroke-opacity="0.08" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="675" fill="#05070f"/>
  <circle cx="240" cy="180" r="360" fill="url(#agOrbA)"/>
  <circle cx="1000" cy="220" r="340" fill="url(#agOrbB)"/>
  <circle cx="640" cy="640" r="320" fill="url(#agOrbC)"/>
  <rect width="1200" height="675" fill="url(#agGrid)"/>
  <rect width="1200" height="675" fill="url(#agVign)"/>

  <!-- 节点网络：智能体的「规划 + 调工具」意象 -->
  <g stroke="#38e8ff" stroke-opacity="0.35" stroke-width="1.5">
    <line x1="880" y1="200" x2="1010" y2="150"/>
    <line x1="880" y1="200" x2="1020" y2="300"/>
    <line x1="880" y1="200" x2="960" y2="410"/>
    <line x1="1010" y1="150" x2="1100" y2="250"/>
    <line x1="1020" y1="300" x2="1100" y2="250"/>
    <line x1="960" y1="410" x2="1080" y2="440"/>
  </g>
  <g fill="#38e8ff">
    <circle cx="880" cy="200" r="9" fill="#b06bff"/>
    <circle cx="1010" cy="150" r="6"/>
    <circle cx="1020" cy="300" r="6"/>
    <circle cx="960" cy="410" r="6"/>
    <circle cx="1100" cy="250" r="6" fill="#6f9bff"/>
    <circle cx="1080" cy="440" r="6" fill="#6f9bff"/>
  </g>

  <text x="80" y="250" font-family="Inter, 'Segoe UI', sans-serif" font-size="26" letter-spacing="6" font-weight="600" fill="#38e8ff">// AI 原理</text>
  <text x="76" y="380" font-family="Inter, 'Segoe UI', sans-serif" font-size="118" font-weight="800" fill="url(#agText)">AI Agent</text>
  <text x="80" y="450" font-family="Inter, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="34" font-weight="600" fill="#c3ccdf">智能体的原理与能力边界</text>

  <g stroke="#38e8ff" stroke-opacity="0.5" stroke-width="2" fill="none">
    <path d="M80 500 h120"/>
    <circle cx="215" cy="500" r="5" fill="#38e8ff" stroke="none"/>
  </g>
</svg>
