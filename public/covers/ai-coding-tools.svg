<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" fill="none">
  <defs>
    <linearGradient id="ctBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0f14"/>
      <stop offset="1" stop-color="#0c1119"/>
    </linearGradient>
    <linearGradient id="ctCap" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7dffc4"/>
      <stop offset="0.5" stop-color="#38e8ff"/>
      <stop offset="1" stop-color="#c084fc"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="675" fill="url(#ctBg)"/>
  <text x="80" y="88" font-family="Inter, 'Segoe UI', sans-serif" font-size="24" letter-spacing="6" font-weight="600" fill="#7dffc4">// AI 对比</text>

  <!-- 对比矩阵 -->
  <g font-family="Inter, 'PingFang SC', 'Microsoft YaHei', sans-serif">
    <rect x="80" y="118" width="1040" height="300" rx="16" fill="rgba(255,255,255,0.03)" stroke="#ffffff" stroke-opacity="0.09"/>

    <!-- 表头 -->
    <g font-size="22" font-weight="800">
      <text x="112" y="164" fill="#6f7f95">维度</text>
      <text x="400" y="164" fill="#7dffc4" text-anchor="middle">Cursor</text>
      <text x="640" y="164" fill="#38e8ff" text-anchor="middle">Copilot</text>
      <text x="870" y="164" fill="#c084fc" text-anchor="middle">Windsurf</text>
      <text x="1060" y="164" fill="#fbbf24" text-anchor="middle">CLI</text>
    </g>
    <line x1="104" y1="184" x2="1096" y2="184" stroke="#ffffff" stroke-opacity="0.1"/>

