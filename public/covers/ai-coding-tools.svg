      <text x="640" y="232" fill="#8be9ff">插件</text>
      <text x="870" y="232" fill="#d8b4fe">编辑器</text>
      <text x="1060" y="232" fill="#fcd34d">终端</text>
    </g>
    <!-- 评分点 -->
    <g>
      <g fill="#7dffc4"><circle cx="370" cy="286" r="7"/><circle cx="394" cy="286" r="7"/><circle cx="418" cy="286" r="7"/><circle cx="442" cy="286" r="7" fill="#243a33"/></g>
      <g fill="#38e8ff"><circle cx="610" cy="286" r="7"/><circle cx="634" cy="286" r="7"/><circle cx="658" cy="286" r="7" fill="#1b3440"/><circle cx="682" cy="286" r="7" fill="#1b3440"/></g>
      <g fill="#c084fc"><circle cx="840" cy="286" r="7"/><circle cx="864" cy="286" r="7"/><circle cx="888" cy="286" r="7"/><circle cx="912" cy="286" r="7" fill="#33254a"/></g>
      <g fill="#fbbf24"><circle cx="1030" cy="286" r="7"/><circle cx="1054" cy="286" r="7"/><circle cx="1078" cy="286" r="7"/><circle cx="1102" cy="286" r="7" fill="#3d3320"/></g>

      <g fill="#7dffc4"><circle cx="370" cy="346" r="7"/><circle cx="394" cy="346" r="7"/><circle cx="418" cy="346" r="7"/><circle cx="442" cy="346" r="7" fill="#243a33"/></g>
      <g fill="#38e8ff"><circle cx="610" cy="346" r="7"/><circle cx="634" cy="346" r="7" fill="#1b3440"/><circle cx="658" cy="346" r="7" fill="#1b3440"/><circle cx="682" cy="346" r="7" fill="#1b3440"/></g>
      <g fill="#c084fc"><circle cx="840" cy="346" r="7"/><circle cx="864" cy="346" r="7"/><circle cx="888" cy="346" r="7"/><circle cx="912" cy="346" r="7"/></g>
      <g fill="#fbbf24"><circle cx="1030" cy="346" r="7"/><circle cx="1054" cy="346" r="7"/><circle cx="1078" cy="346" r="7"/><circle cx="1102" cy="346" r="7"/></g>
