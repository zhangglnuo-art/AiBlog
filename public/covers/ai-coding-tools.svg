  <text x="80" y="516" font-family="Inter, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="56" font-weight="800" fill="url(#ctCap)">AI 编程工具怎么选</text>
  <text x="84" y="562" font-family="Inter, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="27" font-weight="600" fill="#7f8ba3">编辑器 · 插件 · 终端，三种形态横评</text>
