<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" fill="none">
  <defs>
    <linearGradient id="ssBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a1210"/>
      <stop offset="1" stop-color="#121007"/>
    </linearGradient>
    <linearGradient id="ssCap" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#4ade80"/>
      <stop offset="1" stop-color="#fbbf24"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="675" fill="url(#ssBg)"/>
  <text x="80" y="92" font-family="Inter, 'Segoe UI', sans-serif" font-size="24" letter-spacing="6" font-weight="600" fill="#fbbf24">// AI 订阅指南</text>

  <!-- 月付卡 -->
  <g transform="translate(90 136)" font-family="Inter, 'PingFang SC', 'Microsoft YaHei', sans-serif">
    <rect x="0" y="0" width="400" height="250" rx="18" fill="rgba(255,255,255,0.04)" stroke="#ffffff" stroke-opacity="0.12"/>
    <text x="32" y="52" font-size="24" font-weight="700" fill="#9aa5b1">月付</text>
    <text x="32" y="132" font-family="Inter, sans-serif" font-size="66" font-weight="800" fill="#d6dde6">$20</text>
    <text x="182" y="132" font-size="22" font-weight="600" fill="#7d8791">/ 月</text>
    <line x1="32" y1="164" x2="368" y2="164" stroke="#ffffff" stroke-opacity="0.1"/>
    <text x="32" y="204" font-size="21" font-weight="600" fill="#8b95a1">一年 = $240</text>
  </g>

  <!-- 年付卡（推荐） -->
  <g transform="translate(540 136)" font-family="Inter, 'PingFang SC', 'Microsoft YaHei', sans-serif">
    <rect x="0" y="0" width="400" height="250" rx="18" fill="rgba(74,222,128,0.08)" stroke="#4ade80" stroke-opacity="0.55" stroke-width="2"/>
    <text x="32" y="52" font-size="24" font-weight="700" fill="#86efac">年付</text>
    <text x="32" y="132" font-family="Inter, sans-serif" font-size="66" font-weight="800" fill="#d9f99d">$192</text>
    <text x="212" y="132" font-size="22" font-weight="600" fill="#86efac">/ 年</text>
    <line x1="32" y1="164" x2="368" y2="164" stroke="#4ade80" stroke-opacity="0.25"/>
    <text x="32" y="204" font-size="21" font-weight="600" fill="#a7f3c0">相当于白送 2 个月</text>
  </g>

  <!-- 省钱徽标 -->
  <g transform="translate(972 190)">
    <circle r="86" fill="rgba(251,191,36,0.12)" stroke="#fbbf24" stroke-width="3"/>
    <text x="0" y="-8" font-family="Inter, sans-serif" font-size="46" font-weight="800" fill="#fcd34d" text-anchor="middle">20%</text>
    <text x="0" y="30" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="22" font-weight="700" fill="#fcd34d" text-anchor="middle">省下</text>
  </g>

  <!-- 提示条 -->
  <g transform="translate(90 416)" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="20" font-weight="700">
    <rect x="0" y="0" width="270" height="46" rx="12" fill="rgba(74,222,128,0.1)" stroke="#4ade80" stroke-opacity="0.4"/>
    <text x="135" y="30" fill="#86efac" text-anchor="middle">✓ 砍掉不用的</text>
    <rect x="292" y="0" width="270" height="46" rx="12" fill="rgba(251,191,36,0.1)" stroke="#fbbf24" stroke-opacity="0.4"/>
    <text x="427" y="30" fill="#fcd34d" text-anchor="middle">✓ 按需轮换订阅</text>
    <rect x="584" y="0" width="270" height="46" rx="12" fill="rgba(248,113,113,0.1)" stroke="#f87171" stroke-opacity="0.45"/>
    <text x="719" y="30" fill="#fca5a5" text-anchor="middle">✕ 慎用合租账号</text>
  </g>

  <text x="86" y="556" font-family="Inter, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="56" font-weight="800" fill="url(#ssCap)">AI 订阅怎么省钱</text>
  <text x="90" y="602" font-family="Inter, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="27" font-weight="600" fill="#8b9a86">年付 · 合租风险 · 退订避坑</text>
</svg>
