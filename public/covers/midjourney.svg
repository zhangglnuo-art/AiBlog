<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" fill="none">
  <defs>
    <linearGradient id="mjBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#160a20"/>
      <stop offset="1" stop-color="#1c0a16"/>
    </linearGradient>
    <linearGradient id="t1" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#ff5da2"/><stop offset="1" stop-color="#ff9d5c"/></linearGradient>
    <linearGradient id="t2" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#2dd4bf"/><stop offset="1" stop-color="#3366ff"/></linearGradient>
    <linearGradient id="t3" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#b06bff"/><stop offset="1" stop-color="#ff7eb3"/></linearGradient>
    <linearGradient id="t4" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#ffd166"/><stop offset="1" stop-color="#ff5d5d"/></linearGradient>
    <linearGradient id="mjCap" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#ffd6a0"/><stop offset="0.5" stop-color="#ff7eb3"/><stop offset="1" stop-color="#b06bff"/></linearGradient>
  </defs>

  <rect width="1200" height="675" fill="url(#mjBg)"/>

  <!-- 生成图库四宫格 -->
  <g>
    <rect x="160" y="96" width="200" height="200" rx="18" fill="url(#t1)"/>
    <rect x="388" y="96" width="200" height="200" rx="18" fill="url(#t2)"/>
    <rect x="616" y="96" width="200" height="200" rx="18" fill="url(#t3)"/>
    <rect x="844" y="96" width="200" height="200" rx="18" fill="url(#t4)"/>
    <!-- 每格里点缀一点星光，像生成的画面 -->
    <g fill="#ffffff" opacity="0.85">
      <circle cx="230" cy="160" r="4"/><circle cx="300" cy="230" r="3"/>
      <circle cx="470" cy="150" r="3"/><circle cx="540" cy="240" r="4"/>
      <circle cx="690" cy="230" r="4"/><circle cx="770" cy="150" r="3"/>
      <circle cx="910" cy="160" r="3"/><circle cx="1000" cy="235" r="4"/>
    </g>
  </g>

  <!-- /imagine 提示词条 -->
  <g transform="translate(160 336)">
    <rect x="0" y="0" width="884" height="70" rx="16" fill="rgba(255,255,255,0.05)" stroke="#ff7eb3" stroke-opacity="0.45" stroke-width="2"/>
    <text x="28" y="44" font-family="'JetBrains Mono', Consolas, monospace" font-size="24" font-weight="700" fill="#ffb3d4">/imagine</text>
    <text x="168" y="44" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="23" fill="#e8d6e6">霓虹都市 · 赛博朋克 · 超精细光影</text>
    <rect x="720" y="20" width="3" height="30" fill="#ff7eb3"/>
  </g>

  <text x="160" y="524" font-family="Inter, 'Segoe UI', sans-serif" font-size="62" font-weight="800" fill="url(#mjCap)">Midjourney</text>
  <text x="164" y="576" font-family="Inter, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="30" font-weight="600" fill="#d9b8cf">国内付款开通全流程</text>
</svg>
