<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" fill="none">
  <defs>
    <linearGradient id="mmBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0e18"/>
      <stop offset="1" stop-color="#0e0a18"/>
    </linearGradient>
    <radialGradient id="mmCore" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.4" stop-color="#8ab4ff"/>
      <stop offset="1" stop-color="#3a2f8f" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="mmCap" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38e8ff"/>
      <stop offset="0.35" stop-color="#ff7eb3"/>
      <stop offset="0.7" stop-color="#7dffc4"/>
      <stop offset="1" stop-color="#ffd166"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="675" fill="url(#mmBg)"/>

  <text x="80" y="96" font-family="Inter, 'Segoe UI', sans-serif" font-size="24" letter-spacing="6" font-weight="600" fill="#8ab4ff">// AI 原理</text>

  <!-- 四个模态输入 → 汇入中心模型 -->
  <g>
    <!-- 连线 -->
    <g fill="none" stroke-width="3" stroke-opacity="0.6">
      <path d="M392 190 C 540 190, 600 300, 726 300" stroke="#38e8ff"/>
      <path d="M392 262 C 540 262, 600 300, 726 300" stroke="#ff7eb3"/>
      <path d="M392 334 C 540 334, 600 300, 726 300" stroke="#7dffc4"/>
      <path d="M392 406 C 540 406, 600 300, 726 300" stroke="#ffd166"/>
    </g>

    <!-- 模态卡片 -->
    <g font-family="Inter, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="22" font-weight="700">
      <!-- 文本 -->
      <rect x="96" y="160" width="296" height="60" rx="13" fill="rgba(56,232,255,0.10)" stroke="#38e8ff" stroke-opacity="0.6"/>
      <g stroke="#38e8ff" stroke-width="3" stroke-linecap="round"><line x1="122" y1="182" x2="150" y2="182"/><line x1="122" y1="192" x2="158" y2="192"/><line x1="122" y1="202" x2="142" y2="202"/></g>
      <text x="180" y="198" fill="#8be9ff">文本 Text</text>
      <!-- 图像 -->
      <rect x="96" y="232" width="296" height="60" rx="13" fill="rgba(255,126,179,0.10)" stroke="#ff7eb3" stroke-opacity="0.6"/>
      <g><rect x="120" y="248" width="30" height="28" rx="4" fill="none" stroke="#ff7eb3" stroke-width="3"/><circle cx="129" cy="257" r="3" fill="#ff7eb3"/><path d="M123 274 L134 262 L147 274" fill="none" stroke="#ff7eb3" stroke-width="3"/></g>
      <text x="180" y="270" fill="#ffb3d4">图像 Image</text>
      <!-- 音频 -->
      <rect x="96" y="304" width="296" height="60" rx="13" fill="rgba(125,255,196,0.10)" stroke="#7dffc4" stroke-opacity="0.6"/>
      <g stroke="#7dffc4" stroke-width="3" stroke-linecap="round"><line x1="122" y1="334" x2="122" y2="342"/><line x1="132" y1="326" x2="132" y2="350"/><line x1="142" y1="330" x2="142" y2="346"/><line x1="152" y1="322" x2="152" y2="354"/></g>
      <text x="180" y="342" fill="#a7f5d5">音频 Audio</text>
      <!-- 视频 -->
      <rect x="96" y="376" width="296" height="60" rx="13" fill="rgba(255,209,102,0.10)" stroke="#ffd166" stroke-opacity="0.6"/>
      <g><rect x="120" y="392" width="34" height="28" rx="5" fill="none" stroke="#ffd166" stroke-width="3"/><path d="M133 400 L143 406 L133 412 Z" fill="#ffd166"/></g>
      <text x="180" y="414" fill="#ffe1a3">视频 Video</text>
    </g>

    <!-- 中心模型核心 -->
    <g transform="translate(788 300)">
      <circle r="128" fill="url(#mmCore)"/>
      <circle r="64" fill="#0b1020" stroke="#bcd3ff" stroke-opacity="0.6" stroke-width="2"/>
      <text x="0" y="-2" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="20" font-weight="800" fill="#dbe6ff" text-anchor="middle">多模态</text>
      <text x="0" y="24" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="16" font-weight="600" fill="#9fb0d6" text-anchor="middle">模型</text>
    </g>
  </g>

  <text x="72" y="556" font-family="Inter, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="58" font-weight="800" fill="url(#mmCap)">多模态大模型</text>
  <text x="76" y="602" font-family="Inter, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="28" font-weight="600" fill="#8ea6d6">让 AI 同时看懂图文音视频</text>
</svg>
