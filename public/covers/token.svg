<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" fill="none">
  <defs>
    <linearGradient id="tkBg" x1="0" y1="0" x2="0.7" y2="1">
      <stop offset="0" stop-color="#080c1a"/>
      <stop offset="1" stop-color="#0a1120"/>
    </linearGradient>
    <linearGradient id="tkCap" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#5eead4"/>
      <stop offset="1" stop-color="#fcd34d"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="675" fill="url(#tkBg)"/>
  <text x="80" y="92" font-family="Inter, 'Segoe UI', sans-serif" font-size="24" letter-spacing="6" font-weight="600" fill="#5eead4">// AI 原理</text>

  <!-- 原始句子 -->
  <g transform="translate(80 190)" font-family="'PingFang SC','Microsoft YaHei',sans-serif">
    <rect x="0" y="0" width="252" height="70" rx="14" fill="rgba(94,234,212,0.08)" stroke="#5eead4" stroke-opacity="0.5"/>
    <text x="126" y="45" font-size="26" font-weight="700" fill="#99f6e4" text-anchor="middle">「AI真有趣！」</text>
    <text x="126" y="100" font-size="17" font-weight="600" fill="#54689a" text-anchor="middle">你输入的文本</text>
  </g>

  <!-- 分词箭头 -->
  <g stroke="#5eead4" stroke-opacity="0.6" stroke-width="3" fill="none">
    <path d="M348 225 H 404"/>
    <path d="M394 217 L 408 225 L 394 233" stroke-linejoin="round"/>
  </g>
  <text x="378" y="204" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="16" font-weight="600" fill="#4f9e91" text-anchor="middle">分词器</text>

  <!-- Token 块 -->
  <g transform="translate(424 176)" font-family="'PingFang SC','Microsoft YaHei',sans-serif">
    <g text-anchor="middle">
      <rect x="0" y="14" width="96" height="70" rx="12" fill="rgba(94,234,212,0.10)" stroke="#5eead4" stroke-opacity="0.6"/>
      <text x="48" y="59" font-size="26" font-weight="800" fill="#99f6e4">AI</text>
      <text x="48" y="118" font-family="Consolas, monospace" font-size="16" fill="#54689a">#1523</text>

      <rect x="112" y="14" width="96" height="70" rx="12" fill="rgba(94,234,212,0.10)" stroke="#5eead4" stroke-opacity="0.6"/>
      <text x="160" y="59" font-size="26" font-weight="800" fill="#99f6e4">真</text>
      <text x="160" y="118" font-family="Consolas, monospace" font-size="16" fill="#54689a">#887</text>

      <rect x="224" y="14" width="120" height="70" rx="12" fill="rgba(94,234,212,0.10)" stroke="#5eead4" stroke-opacity="0.6"/>
      <text x="284" y="59" font-size="26" font-weight="800" fill="#99f6e4">有趣</text>
      <text x="284" y="118" font-family="Consolas, monospace" font-size="16" fill="#54689a">#20315</text>

      <rect x="360" y="14" width="96" height="70" rx="12" fill="rgba(94,234,212,0.10)" stroke="#5eead4" stroke-opacity="0.6"/>
      <text x="408" y="59" font-size="26" font-weight="800" fill="#99f6e4">！</text>
      <text x="408" y="118" font-family="Consolas, monospace" font-size="16" fill="#54689a">#0</text>
    </g>
  </g>

  <!-- 计数箭头 -->
  <g stroke="#fcd34d" stroke-opacity="0.7" stroke-width="3" fill="none">
    <path d="M902 225 H 958"/>
    <path d="M948 217 L 962 225 L 948 233" stroke-linejoin="round"/>
  </g>

  <!-- 计费表 -->
  <g transform="translate(972 168)" font-family="'PingFang SC','Microsoft YaHei',sans-serif">
    <rect x="0" y="0" width="152" height="64" rx="14" fill="rgba(252,211,77,0.12)" stroke="#fcd34d" stroke-width="2.5"/>
    <text x="76" y="41" font-size="24" font-weight="800" fill="#fde68a" text-anchor="middle">4 Tokens</text>
    <rect x="0" y="82" width="152" height="52" rx="14" fill="rgba(252,211,77,0.06)" stroke="#fcd34d" stroke-opacity="0.45"/>
    <text x="76" y="115" font-size="19" font-weight="700" fill="#d9c476" text-anchor="middle">按量计费 $</text>
  </g>

  <!-- 三个用途角标 -->
  <g transform="translate(80 388)" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="19" font-weight="600">
    <rect x="0" y="0" width="196" height="48" rx="24" fill="rgba(94,234,212,0.06)" stroke="#5eead4" stroke-opacity="0.35"/>
    <text x="98" y="31" fill="#7ccec2" text-anchor="middle">计费数它</text>
    <rect x="216" y="0" width="196" height="48" rx="24" fill="rgba(94,234,212,0.06)" stroke="#5eead4" stroke-opacity="0.35"/>
    <text x="314" y="31" fill="#7ccec2" text-anchor="middle">上下文量它</text>
    <rect x="432" y="0" width="196" height="48" rx="24" fill="rgba(94,234,212,0.06)" stroke="#5eead4" stroke-opacity="0.35"/>
    <text x="530" y="31" fill="#7ccec2" text-anchor="middle">速度看它</text>
  </g>

  <text x="76" y="556" font-family="Inter, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="58" font-weight="800" fill="url(#tkCap)">Token</text>
  <text x="300" y="556" font-family="Inter, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="28" font-weight="600" fill="#8b96b8">大模型计费与上下文的基本单位</text>
</svg>
