<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" fill="none">
  <defs>
    <linearGradient id="tpBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0d16"/>
      <stop offset="1" stop-color="#120c10"/>
    </linearGradient>
    <linearGradient id="tpTrack" gradientUnits="userSpaceOnUse" x1="140" y1="0" x2="1060" y2="0">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="0.35" stop-color="#22d3ee"/>
      <stop offset="0.6" stop-color="#facc15"/>
      <stop offset="0.82" stop-color="#fb923c"/>
      <stop offset="1" stop-color="#ef4444"/>
    </linearGradient>
    <linearGradient id="tpCap" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#fb7185"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="675" fill="url(#tpBg)"/>
  <text x="80" y="100" font-family="Inter, 'Segoe UI', sans-serif" font-size="24" letter-spacing="6" font-weight="600" fill="#7dd3fc">// AI 原理</text>

  <!-- 两端示例卡片 -->
  <g font-family="Inter, 'PingFang SC', 'Microsoft YaHei', sans-serif">
    <g transform="translate(140 150)">
      <rect x="0" y="0" width="330" height="96" rx="14" fill="rgba(56,189,248,0.09)" stroke="#38bdf8" stroke-opacity="0.5"/>
      <text x="24" y="38" font-size="20" font-weight="800" fill="#7dd3fc">低温 · 保守</text>
      <text x="24" y="70" font-size="19" font-weight="600" fill="#8ba6bd">同样问题 → 几乎同样答案</text>
    </g>
    <g transform="translate(730 150)">
      <rect x="0" y="0" width="330" height="96" rx="14" fill="rgba(239,68,68,0.09)" stroke="#ef4444" stroke-opacity="0.5"/>
      <text x="24" y="38" font-size="20" font-weight="800" fill="#fca5a5">高温 · 发散</text>
      <text x="24" y="70" font-size="19" font-weight="600" fill="#bd94a0">同样问题 → 每次都不同</text>
    </g>
  </g>

  <!-- 温度滑杆 -->
  <g>
    <rect x="140" y="316" width="920" height="26" rx="13" fill="url(#tpTrack)"/>
    <!-- 刻度 -->
    <g stroke="#ffffff" stroke-opacity="0.25" stroke-width="2">
      <line x1="140" y1="352" x2="140" y2="366"/>
      <line x1="416" y1="352" x2="416" y2="366"/>
      <line x1="600" y1="352" x2="600" y2="366"/>
      <line x1="1060" y1="352" x2="1060" y2="366"/>
    </g>
    <g font-family="Inter, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="19" font-weight="700" fill="#7f8ba3">
      <text x="140" y="394">0</text>
      <text x="416" y="394" text-anchor="middle">0.3</text>
      <text x="600" y="394" text-anchor="middle">0.7 默认</text>
      <text x="1060" y="394" text-anchor="end">1.5+</text>
    </g>
    <!-- 手柄停在 0.7 -->
    <circle cx="600" cy="329" r="22" fill="#0a0d16" stroke="#facc15" stroke-width="4"/>
    <circle cx="600" cy="329" r="8" fill="#facc15"/>
  </g>

  <text x="76" y="512" font-family="Inter, 'Segoe UI', sans-serif" font-size="76" font-weight="800" fill="url(#tpCap)">Temperature</text>
  <text x="80" y="562" font-family="Inter, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="28" font-weight="600" fill="#8ba6bd">为什么 AI 每次回答都不一样</text>
</svg>
